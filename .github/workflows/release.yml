name: Release

on:
  push:
    tags:
      - v*.*.* # Match semantic version tags
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - artifact: dfm-linux-gnu-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - artifact: dfm-windows-x86_64.exe
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rust-src
       
      - name: Build
        shell: bash
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }}

      - name: Collect
        shell: bash
        run: |
          mkdir dist

          BIN=dfm
          case "${{ matrix.target }}" in
            *windows*)
              BIN="${BIN}.exe"
              ;;
          esac

          cp \
            "target/${{ matrix.target }}/release/${BIN}" \
            "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs:
      - build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - id: date
        run: |
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v3
        with:
          name: Build ${{ steps.date.outputs.date }}
          prerelease: false
          files: artifacts/**/*
          overwrite_files: true
